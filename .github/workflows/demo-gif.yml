name: demo-gif
on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - demo.tape
      - .github/workflows/demo-gif.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: demo-gif
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Build pista
        run: |
          go build -o pista ./cmd/pista
          sudo mv pista /usr/local/bin/pista
      - name: Install bat and font
        run: |
          sudo apt-get update
          sudo apt-get install -y bat
          sudo ln -sf /usr/bin/batcat /usr/local/bin/bat
          # JetBrains Mono is the tape's default font; best-effort for fidelity.
          sudo apt-get install -y fonts-jetbrains-mono || true
      - name: Install VHS
        # vhs-action's ffmpeg installer is broken (it fetches a BtbN asset that
        # no longer exists), so install VHS via Homebrew. The vhs formula pulls
        # in ttyd and ffmpeg as dependencies.
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install vhs
      - name: Render demo.gif
        run: vhs demo.tape
      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: demo.gif
          base: main
          branch: update-demo-gif
          delete-branch: true
          commit-message: Update demo.gif
          title: Update demo.gif
          body: |
            Regenerated demo.gif from demo.tape.
