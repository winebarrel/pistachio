name: demo-gif
on:
  workflow_call:
  push:
    branches:
      - main
    paths:
      - demo.tape
      - .github/workflows/demo-gif.yml

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: demo-gif
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Build pista
        run: |
          go build -o pista ./cmd/pista
          sudo mv pista /usr/local/bin/pista
      - name: Install bat and font
        run: |
          sudo apt-get update
          sudo apt-get install -y bat
          sudo ln -sf /usr/bin/batcat /usr/local/bin/bat
          # JetBrains Mono is the tape's default font; best-effort for fidelity.
          sudo apt-get install -y fonts-jetbrains-mono || true
      - name: Cache Homebrew downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/Homebrew/downloads
          key: brew-downloads-${{ runner.os }}-${{ hashFiles('.github/workflows/demo-gif.yml') }}
          restore-keys: |
            brew-downloads-${{ runner.os }}-
      - name: Install VHS
        # vhs-action's ffmpeg installer is broken (it fetches a BtbN asset that
        # no longer exists), so install VHS via Homebrew. The vhs formula pulls
        # in ttyd and ffmpeg as dependencies. Homebrew ships with the runner but
        # is not on PATH by default, so load its shellenv and expose its bin to
        # later steps.
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "$HOMEBREW_PREFIX/bin" >> "$GITHUB_PATH"
          brew install vhs
      - name: Render demo.gif
        run: vhs demo.tape
      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- demo.gif; then
            echo "demo.gif unchanged; nothing to do."
            exit 0
          fi
          branch=update-demo-gif
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add demo.gif
          git commit -m "Update demo.gif"
          git push -f origin "$branch"
          if [ "$(gh pr list --head "$branch" --state open --json number --jq 'length')" -eq 0 ]; then
            gh pr create --base main --head "$branch" \
              --title "Update demo.gif" \
              --body "Regenerated demo.gif from demo.tape."
          else
            echo "PR already open; branch updated."
          fi
