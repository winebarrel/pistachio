name: CI
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash -xeo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ascii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check for non-ASCII characters
        run: |
          matches=$(LC_ALL=C git grep -nIP '[^\x00-\x7F]' -- .) && status=0 || status=$?
          if [ "$status" -eq 0 ]; then
            echo "Error: non-ASCII characters found:"
            echo "$matches"
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "Error: git grep failed with status $status"
            exit "$status"
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
      - run: make deadcode
      - run: make TEST_OPTS='-coverprofile=coverage.txt'
      - run: make test-scenario
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: pg${{ matrix.postgres }}
          # Each matrix job uploads its own coverage; Codecov merges them so
          # PG-version-specific paths (e.g. PG18-only catalog reads) are
          # counted as covered when any matrix entry exercises them.
