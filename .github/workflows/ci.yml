name: CI
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: bash -xeo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ascii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check for non-ASCII characters
        run: |
          matches=$(LC_ALL=C git grep -nIP '[^\x00-\x7F]' -- .) && status=0 || status=$?
          if [ "$status" -eq 0 ]; then
            echo "Error: non-ASCII characters found:"
            echo "$matches"
            exit 1
          elif [ "$status" -ne 1 ]; then
            echo "Error: git grep failed with status $status"
            exit "$status"
          fi

  windows:
    runs-on: windows-latest
    env:
      CGO_ENABLED: "1"
    steps:
      # Keep LF line endings; test fixtures are compared byte for byte.
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install GNU Make
        run: choco install -y --no-progress make
      # PostgreSQL is preinstalled on the runner image but the service is
      # stopped and disabled by default. Switch it to trust auth to match
      # the Linux jobs (POSTGRES_HOST_AUTH_METHOD=trust) before starting.
      - name: Start PostgreSQL
        shell: pwsh
        run: |
          Set-Content -Path "$env:PGDATA\pg_hba.conf" -Value "host all all 127.0.0.1/32 trust`nhost all all ::1/128 trust"
          Get-Service -Name postgresql* | Set-Service -StartupType Manual -PassThru | Start-Service
          & "$env:PGBIN\pg_isready" -h localhost -t 30
      - name: Build
        run: go build -o pista.exe ./cmd/pista
      - name: Smoke test
        run: ./pista.exe --help
      - run: make TEST_OPTS='-coverprofile=coverage.txt'
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: [15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
      - run: make deadcode
      - run: make TEST_OPTS='-coverprofile=coverage.txt'
      - run: make test-scenario
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: pg${{ matrix.postgres }}
          # Each matrix job uploads its own coverage; Codecov merges them so
          # PG-version-specific paths (e.g. PG18-only catalog reads) are
          # counted as covered when any matrix entry exercises them.
