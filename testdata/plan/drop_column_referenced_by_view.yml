drop_policy:
  allow_drop: [all]
init: |
  CREATE TABLE public.posts (
      id integer NOT NULL,
      title text NOT NULL,
      updated_at timestamp NOT NULL,
      CONSTRAINT posts_pkey PRIMARY KEY (id)
  );
  CREATE VIEW public.posts_summary AS
      SELECT id, title, updated_at FROM public.posts;
