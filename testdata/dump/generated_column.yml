init: |
  CREATE TABLE public.products (
      id integer NOT NULL,
      price numeric(10,2) NOT NULL,
      quantity integer NOT NULL,
      total numeric(10,2) GENERATED ALWAYS AS (price * quantity) STORED,
      CONSTRAINT products_pkey PRIMARY KEY (id)
  );
