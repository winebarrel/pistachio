init: |
  CREATE TABLE public.users (
      id integer NOT NULL,
      name text NOT NULL,
      CONSTRAINT users_pkey PRIMARY KEY (id)
  );
  CREATE VIEW public.active_users AS SELECT id, name FROM public.users;
