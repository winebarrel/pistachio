enable: [domain]
init: |
  CREATE DOMAIN public.pos_int AS integer CONSTRAINT pos_check CHECK (VALUE > 0);
  CREATE TABLE public.users (
      id integer NOT NULL,
      CONSTRAINT users_pkey PRIMARY KEY (id)
  );
