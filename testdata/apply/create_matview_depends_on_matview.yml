applied: |
  -- public.users
  CREATE TABLE public.users (
      id integer NOT NULL,
      CONSTRAINT users_pkey PRIMARY KEY (id)
  );

  -- public.has_users
  CREATE MATERIALIZED VIEW public.has_users AS
  SELECT user_count.cnt > 0 AS result
     FROM user_count;

  -- public.user_count
  CREATE MATERIALIZED VIEW public.user_count AS
  SELECT count(*) AS cnt
     FROM users;
